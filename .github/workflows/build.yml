name: Build Origins + Extra Slot Amy (Android 16 Fix)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod Amy
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Mod Code
        run: |
          find mod_amy -name "*.c" -exec cp -v {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp -v {} engine/Game/Objects/ \;

      - name: Build APK (Debug Mode)
        run: |
          cd engine/android
          chmod +x gradlew
          # Usamos assembleDebug para garantir que o arquivo seja criado
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a"

      - name: Prepare and Sign APK
        run: |
          # 1. Localiza o APK na pasta debug (que agora temos certeza que existe)
          RAW_APK=$(find engine/android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "APK encontrado em: $RAW_APK"
          
          # 2. Zipalign (Ajustando para o caminho correto do build-tools)
          # O Android 16 exige esse alinhamento para leitura rápida de memória
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" SonicOrigins_Aligned.apk
          
          # 3. Gera chave de assinatura temporária
          keytool -genkey -v -keystore dev-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev-alias -storepass password -keypass password -dname "CN=Android, OU=Dev, O=Game, L=World, ST=World, C=US"
          
          # 4. Assina com APKSigner (Esquema V2/V3 para compatibilidade total)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev-key.jks --ks-key-alias dev-alias --ks-pass pass:password --key-pass pass:password --out SonicOrigins_Final.apk SonicOrigins_Aligned.apk
          
          echo "Processo concluído com sucesso!"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Android16
          path: SonicOrigins_Final.apk
          
