name: Build Bruno Origins + Amy Mod

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Baixa o código da Amy Extra Slot
      - name: Checkout Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Injeta o código da Amy na Engine
      - name: Apply Amy Code
        run: |
          # Cria a pasta de objetos se não existir
          mkdir -p java/Game/Objects
          # Copia os arquivos .c e .h do mod para dentro da engine do Bruno
          find temp_amy -name "*.c" -exec cp -v {} java/Game/Objects/ \;
          find temp_amy -name "*.h" -exec cp -v {} java/Game/Objects/ \;
          # Remove a pasta temporária para não sujar o build
          rm -rf temp_amy

      # 3. Compilação
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a" --no-daemon

      # 4. Assinatura Especial para Android 16
      - name: Prepare and Sign APK
        run: |
          RAW_APK=$(find . -name "*.apk" | grep -v "unaligned" | head -n 1)
          
          # Alinhamento (Zipalign)
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          # Gerar chave e assinar (V2/V3)
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Bruno_Amy.apk Sonic_Aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Build
          path: Sonic_Bruno_Amy.apk
