name: Build Bruno Origins + Amy (Final Stable)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Download SDL2
        run: |
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          $old = "android/app/jni/SDL2-2.28.3"
          $new = "android/app/jni/SDL"
          if (Test-Path $old) { Move-Item -Path $old -Destination $new }

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Inject Amy Code
        run: |
          # Apenas copia os arquivos, sem editar textos, para evitar o StackOverflowError
          $objPath = "java/Game/Objects"
          if (!(Test-Path $objPath)) { New-Item -ItemType Directory -Force -Path $objPath }
          Copy-Item -Path "temp_amy/*.c" -Destination $objPath -Force
          Copy-Item -Path "temp_amy/*.h" -Destination $objPath -Force

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          # Compila o APK puro. O Android 16 aceita se a assinatura final estiver correta.
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align APK (Fix Android 16)
        shell: bash
        run: |
          # Encontra o APK gerado (deve ter mais de 10MB agora!)
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: O compilador falhou. Verifique os logs de erro acima."
            exit 1
          fi
          
          # Alinhamento e Assinatura V2/V3 (O segredo para o Android 16 aceitar o pacote)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy_Stable.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Stable
          path: Sonic_Origins_Amy_Stable.apk
