name: Build Bruno Origins + Amy (Deep Fix)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Amy Mod
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Inject Amy and Fix SDK
        run: |
          # 1. Limpa e prepara as pastas de código (ajustado para o seu repo)
          mkdir -p java/Game/Objects
          cp -rf temp_amy/*.c java/Game/Objects/ || true
          cp -rf temp_amy/*.h java/Game/Objects/ || true
          
          # 2. Força o SDK 34 (Mais estável que o 35 para compilação no momento)
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' android/app/build.gradle || true
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle || true
          
          # 3. Adiciona permissão de exportação (Obrigatório para Android 12+)
          sed -i '/<activity/ s/$/ android:exported="true"/' android/app/src/main/AndroidManifest.xml || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Limpa o build anterior para evitar que o APK venha com 3MB de novo
          ./gradlew clean
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a" --stacktrace

      - name: Sign and Align
        run: |
          # Busca o APK real (deve estar em android/app/build/outputs/apk/debug/)
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          # Zipalign
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$APK_PATH" Sonic_Aligned.apk
          
          # Assinatura V2/V3/V4
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy_Final.apk Sonic_Aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Final
          path: Sonic_Origins_Amy_Final.apk
