name: Build Origins Android 16 (Amy Compatible)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch for Android 16 Compatibility
        run: |
          # Ajusta versões de SDK para o Android 16
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' engine/android/app/build.gradle || true
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' engine/android/app/build.gradle || true
          
          # Corrige o erro de "Manifest Merger" adicionando exported="true"
          # Isso é o que impede o erro de 'Pacote Inválido' em sistemas novos
          sed -i '/<activity/ s/$/ android:exported="true"/' engine/android/app/src/main/AndroidManifest.xml || true
          
          # Garante que o nome do pacote seja único para evitar conflitos
          sed -i 's/applicationId ".*"/applicationId "org.retrosdk.rsdkv5.amy"/g' engine/android/app/build.gradle || true

      - name: Build APK
        run: |
          cd engine/android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a" --no-daemon

      - name: Prepare and Sign APK
        run: |
          # Localiza o arquivo gerado
          RAW_APK=$(find engine -name "*.apk" | grep -v "unaligned" | head -n 1)
          
          # Alinhamento de memória (Obrigatório no Android 16)
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" SonicOrigins_Aligned.apk
          
          # Assinatura digital completa (V1, V2, V3 e V4)
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy_Edition.apk SonicOrigins_Aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Edition
          path: Sonic_Origins_Amy_Edition.apk
          
