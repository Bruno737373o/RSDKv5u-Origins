name: Build Bruno Origins + Amy (Final Attempt)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Amy Mod
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Prepare Android Project
        run: |
          # 1. Ajusta o Manifesto para evitar erro de pacote inválido no Android 16
          # Procura o arquivo em qualquer subpasta dentro de android/
          MANIFEST_PATH=$(find android -name "AndroidManifest.xml")
          for f in $MANIFEST_PATH; do
            sed -i '/<activity/ s/$/ android:exported="true"/' $f || true
          done
          
          # 2. Injeta o código da Amy (ajustado para a pasta java/ do seu repo)
          mkdir -p java/Game/Objects
          cp -rf temp_amy/*.c java/Game/Objects/ || true
          cp -rf temp_amy/*.h java/Game/Objects/ || true

      - name: Build APK
        run: |
          # Entra na pasta android onde o gradlew realmente está
          cd android
          chmod +x gradlew
          # Executa o build sem o clean para ver se ele avança
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a" --no-daemon

      - name: Sign and Align APK
        run: |
          # Procura o APK gerado em todo o projeto
          RAW_APK=$(find . -name "*debug.apk" | grep -v "unaligned" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: APK não encontrado. O build falhou antes de gerar o arquivo."
            exit 1
          fi
          
          echo "APK encontrado em: $RAW_APK"
          
          # Alinhamento
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          # Assinatura V2/V3/V4 para Android 16
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Bruno_Amy_Final.apk Sonic_Aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Build
          path: Sonic_Bruno_Amy_Final.apk
