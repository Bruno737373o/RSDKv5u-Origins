name: Build Bruno Origins + Amy (Android 16 Fix)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest # Usando Windows como no seu exemplo para facilitar downloads
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Download SDL2 and Dependencies
        run: |
          # Baixando SDL2 (essencial para a Engine)
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          Rename-Item ./android/app/jni/SDL2-2.28.3 SDL

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Prepare Project and Inject Amy
        run: |
          # 1. Injeta o código da Amy nas pastas de objetos
          # Ajustado para a estrutura do Origins
          mkdir -p java/Game/Objects
          Copy-Item -Path temp_amy/*.c -Destination java/Game/Objects/ -ErrorAction SilentlyContinue
          Copy-Item -Path temp_amy/*.h -Destination java/Game/Objects/ -ErrorAction SilentlyContinue

          # 2. Correção de Manifesto para Android 16 (exported="true")
          $manifestPath = Get-ChildItem -Path android -Filter AndroidManifest.xml -Recurse
          foreach ($file in $manifestPath) {
              (Get-Content $file.FullName) -replace '<activity', '<activity android:exported="true"' | Set-Content $file.FullName
          }

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          # Compilando para 64 bits (exigência do Android 16)
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align (Fix Pacote Inválido)
        shell: bash
        run: |
          # 1. Localiza o APK real
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          # 2. Zipalign (Necessário para Android 16)
          # O caminho no runner Windows para as ferramentas do SDK:
          ZIPALIGN="$ANDROID_HOME/build-tools/34.0.0/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          
          $ZIPALIGN -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          # 3. Assina o APK (V2/V3 garantem que o Android 16 aceite)
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          $APKSIGNER sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Final
          path: Sonic_Origins_Amy.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Build
          path: Sonic_Bruno_Amy_Final.apk
