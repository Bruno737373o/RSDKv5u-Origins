name: Build RSDKv5 Origins Stable

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Download SDL2
        run: |
          # O RSDKv5 Android depende do SDL2 na pasta jni
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          if (Test-Path "android/app/jni/SDL2-2.28.3") {
              Move-Item -Path "android/app/jni/SDL2-2.28.3" -Destination "android/app/jni/SDL"
          }

      - name: Stable Manifest & Storage Fix
        run: |
          # Aplica as correções para Android 11+ (necessário para o Android 16 não crashar)
          $manifest = "android/app/src/main/AndroidManifest.xml"
          if (Test-Path $manifest) {
              $content = Get-Content $manifest
              
              # Adiciona permissões de arquivos se não existirem
              $perms = '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />`n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />`n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />'
              if ($content -notmatch "MANAGE_EXTERNAL_STORAGE") {
                  $content = $content -replace '</manifest>', "$perms`n</manifest>"
              }
              
              # Habilita suporte a armazenamento legado e exportação de atividades
              $content = $content -replace '<application', '<application android:requestLegacyExternalStorage="true" android:exported="true"'
              $content = $content -replace '<activity', '<activity android:exported="true"'
              
              $content | Set-Content $manifest
          }

      - name: Build Android APK
        working-directory: ./android
        run: |
          # Compilação limpa apenas para 64 bits (Android 16)
          ./gradlew.bat clean
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align APK
        shell: pwsh
        run: |
          $rawApk = Get-ChildItem -Path android\app\build\outputs\apk\debug\*.apk | Select-Object -First 1
          $buildTools = "${env:ANDROID_HOME}\build-tools\34.0.0"
          
          # Alinhamento
          & "$buildTools\zipalign.exe" -v 4 $rawApk.FullName Sonic_Aligned.apk
          
          # Assinatura (Gera uma chave nova para cada build para garantir validade)
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          # Assina com esquemas V2 e V3 (Indispensável para Android 16)
          & "$buildTools\apksigner.bat" sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Stable.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RSDKv5-Origins-Android
          path: Sonic_Origins_Stable.apk
