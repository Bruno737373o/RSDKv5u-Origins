name: Build Bruno Origins + Amy (Final Stable)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Download SDL2
        run: |
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          $old = "android/app/jni/SDL2-2.28.3"
          $new = "android/app/jni/SDL"
          if (Test-Path $old) { Move-Item -Path $old -Destination $new }

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Inject Amy and Fix Manifest
        run: |
          # 1. Injeta o código da Amy
          $objPath = "java\Game\Objects"
          if (!(Test-Path $objPath)) { New-Item -ItemType Directory -Force -Path $objPath }
          Copy-Item -Path "temp_amy\*.c" -Destination $objPath -Force
          Copy-Item -Path "temp_amy\*.h" -Destination $objPath -Force

          # 2. FIX CRASH: Adiciona permissão de gerenciamento de arquivos e exported
          $manifest = "android/app/src/main/AndroidManifest.xml"
          if (Test-Path $manifest) {
              $content = Get-Content $manifest
              # Adiciona a permissão de All Files Access no cabeçalho
              if ($content -notmatch "MANAGE_EXTERNAL_STORAGE") {
                  $content = $content -replace '<manifest', '<manifest xmlns:tools="http://schemas.android.com/tools"'
                  $content = $content -replace '</manifest>', '    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />`n</manifest>'
              }
              # Força o suporte a armazenamento legado para evitar o crash no seletor de pasta
              $content = $content -replace '<application', '<application android:requestLegacyExternalStorage="true" android:exported="true"'
              $content | Set-Content $manifest
          }

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          # Compila o APK puro. O Android 16 aceita se a assinatura final estiver correta.
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align APK (Fix Android 16)
        shell: pwsh
        run: |
          # 1. Localiza o APK gerado (deve ter +10MB)
          $rawApk = Get-ChildItem -Path android\app\build\outputs\apk\debug\*.apk | Select-Object -First 1
          if (!$rawApk) { throw "ERRO: APK não encontrado!" }
          Write-Host "APK encontrado em: $($rawApk.FullName)"

          # 2. Define caminhos das ferramentas do SDK de forma dinâmica
          $buildToolsVersion = "34.0.0"
          $zipalign = "${env:ANDROID_HOME}\build-tools\${buildToolsVersion}\zipalign.exe"
          $apksigner = "${env:ANDROID_HOME}\build-tools\${buildToolsVersion}\apksigner.bat"

          # 3. Zipalign (Essencial para não dar 'Pacote Inválido')
          & $zipalign -v 4 $rawApk.FullName Sonic_Aligned.apk

          # 4. Gera chave e Assina (V2, V3 e V4 para compatibilidade total com Android 16)
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          & $apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy_Android16.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Android16
          path: Sonic_Origins_Amy_Android16.apk
