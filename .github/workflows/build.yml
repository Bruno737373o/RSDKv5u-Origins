name: Build Origins + Extra Slot Amy

on: 
  workflow_dispatch: # Permite rodar manualmente na aba Actions

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa a Engine (Origins)
      - name: Checkout Engine (Origins)
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      # 2. Baixa o Mod da Amy (Código)
      - name: Checkout Mod (Amy Extra Slot)
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      # 3. Prepara o Ambiente (Java e Dependências de Áudio)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Audio Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libogg-dev libvorbis-dev libtheora-dev

      # 4. Aplica o Mod da Amy no código da Engine
      - name: Apply Amy Mod Code
        run: |
          # Procura arquivos .c e .h no mod e os move para a pasta de objetos da engine
          find mod_amy -name "*.c" -exec cp -v {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp -v {} engine/Game/Objects/ \;

      # 5. Compilação do APK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Debug)
        run: |
          cd engine/android
          chmod +x gradlew
          # Compila para 32 e 64 bits para máxima compatibilidade
          ./gradlew assembleDebug -Pandroid.injected.build.abi="armeabi-v7a,arm64-v8a" --stacktrace

      # 6. Localiza e faz o Upload do APK
      - name: Verify and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Edition
          path: engine/**/*.apk
          if-no-files-found: error
          
