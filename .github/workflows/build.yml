name: Build RSDKv5 Origins Stable (Linux Runner Fix)

on:
  workflow_dispatch:

jobs:
  v5-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK Dependencies
        working-directory: ./dependencies/android
        run: |
          # Baixa bibliotecas de áudio/vídeo
          curl -L -O https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip
          curl -L -O https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip
          unzip -o \*.zip
          rm *.zip
          mkdir -p libogg
          rsync -ar libogg-1.3.5/* libogg/
          mv libtheora-1.1.1 libtheora

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Clean Android 16 Manifest
        run: |
          # Define o caminho do manifesto
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Cria o arquivo do zero usando sintaxe Bash (cat)
          cat <<EOF > $MANIFEST_PATH
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="org.retrosdk.rsdkv5">
              
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

              <application
                  android:label="Sonic Origins"
                  android:requestLegacyExternalStorage="true"
                  android:extractNativeLibs="true"
                  tools:replace="android:allowBackup"
                  android:allowBackup="true">
                  <activity
                      android:name="org.libsdl.app.SDLActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          chmod +x gradlew
          # Compila a revisão estável para 64 bits
          ./gradlew assembleDebug --no-daemon -PABIFILTERS="arm64-v8a" -PRETRO_REVISION=3

      - name: Sign and Align APK
        run: |
          # 1. Encontrar o APK bruto
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: APK não encontrado!"
            exit 1
          fi

          # 2. Localizar as ferramentas do Android SDK (zipalign e apksigner)
          # Buscamos a versão mais recente disponível na pasta build-tools
          BUILD_TOOLS_PATH=$(ls -d ${ANDROID_HOME}/build-tools/* | tail -1)
          echo "Usando Build Tools de: $BUILD_TOOLS_PATH"

          # 3. Alinhamento (Zipalign)
          ${BUILD_TOOLS_PATH}/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk

          # 4. Gerar chave de assinatura
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"

          # 5. Assinar o APK (Apksigner)
          # No Android 16, a assinatura V2 e V3 é obrigatória
          ${BUILD_TOOLS_PATH}/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_v5U.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-v5U-Stable
          path: Sonic_Origins_v5U.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-v5U-Stable
          path: Sonic_Origins_v5U.apk
