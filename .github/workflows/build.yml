name: Build RSDKv5 Origins Stable v18.2

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Download and Setup SDL2
        run: |
          # Download SDL2
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          
          # Renomeia a pasta de forma segura
          $oldPath = "android/app/jni/SDL2-2.28.3"
          $newPath = "android/app/jni/SDL"
          if (Test-Path $oldPath) {
              Move-Item -Path $oldPath -Destination $newPath
          }

      - name: Create Stable Manifest
        run: |
          $manifestPath = "android/app/src/main/AndroidManifest.xml"
          $newManifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="org.retrosdk.rsdkv5">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <application
                  android:label="Sonic Origins"
                  android:requestLegacyExternalStorage="true"
                  android:extractNativeLibs="true">
                  <activity
                      android:name="org.libsdl.app.SDLActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          "@
          Set-Content -Path $manifestPath -Value $newManifest -Encoding UTF8

      - name: Build Android APK
        working-directory: ./android
        run: |
          ./gradlew.bat clean
          # Compila para ambas as arquiteturas para garantir que abra em qualquer celular
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a"

      - name: Sign and Align APK
        shell: pwsh
        run: |
          $rawApk = Get-ChildItem -Path android\app\build\outputs\apk\debug\*.apk | Select-Object -First 1
          $buildTools = "${env:ANDROID_HOME}\build-tools\34.0.0"
          & "$buildTools\zipalign.exe" -v 4 $rawApk.FullName Sonic_Aligned.apk
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          & "$buildTools\apksigner.bat" sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Stable.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RSDKv5-Origins-Android
          path: Sonic_Origins_Stable.apk
