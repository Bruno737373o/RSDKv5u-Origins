name: Build Origins + Extra Slot Amy (Final Fix)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod Amy
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Mod Code
        run: |
          # Remove o arquivo/pasta 'Game' que está causando o conflito
          rm -rf engine/Game
          
          # Cria a estrutura de pastas do zero
          mkdir -p engine/Game/Objects
          
          # Copia arquivos do mod para a engine
          find mod_amy -name "*.c" -exec cp -v {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp -v {} engine/Game/Objects/ \;

      - name: Build APK
        run: |
          cd engine/android
          chmod +x gradlew
          # assembleDebug para garantir a geração do arquivo assinado para teste
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a"

      - name: Prepare and Sign APK
        run: |
          # 1. Busca o APK gerado
          RAW_APK=$(find engine -name "*.apk" | grep -v "unaligned" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: Nenhum APK foi encontrado."
            exit 1
          fi
          
          # 2. Zipalign (Indispensável para o Android 16)
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" SonicOrigins_Aligned.apk
          
          # 3. Gera chave de assinatura
          keytool -genkey -v -keystore dev-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev-alias -storepass password -keypass password -dname "CN=Android, OU=Dev, O=Game, L=World, ST=World, C=US"
          
          # 4. Assina com APKSigner (V2/V3)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev-key.jks --ks-key-alias dev-alias --ks-pass pass:password --key-pass pass:password --out SonicOrigins_Final.apk SonicOrigins_Aligned.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Android16-Final
          path: SonicOrigins_Final.apk
          
