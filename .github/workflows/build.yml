name: Build Bruno Origins + Amy (SDL Fix)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Download and Setup SDL2
        run: |
          # Baixa o SDL2
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          # Extrai diretamente na pasta jni
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          # Usa caminhos compatíveis com Windows para renomear
          $oldPath = "android\app\jni\SDL2-2.28.3"
          $newPath = "android\app\jni\SDL"
          if (Test-Path $oldPath) {
              Move-Item -Path $oldPath -Destination $newPath
          }

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Inject Amy and Fix Manifest
        run: |
          # 1. Injeta a Amy
          $objPath = "java\Game\Objects"
          if (!(Test-Path $objPath)) { New-Item -ItemType Directory -Force -Path $objPath }
          Copy-Item -Path "temp_amy\*.c" -Destination $objPath -ErrorAction SilentlyContinue
          Copy-Item -Path "temp_amy\*.h" -Destination $objPath -ErrorAction SilentlyContinue

          # 2. Fix Android 16 Exported Activity
          $manifests = Get-ChildItem -Path android -Filter AndroidManifest.xml -Recurse
          foreach ($file in $manifests) {
              (Get-Content $file.FullName) -replace '<activity', '<activity android:exported="true"' | Set-Content $file.FullName
          }

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          ./gradlew.bat clean
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align
        shell: bash
        run: |
          # Busca o APK real (deve ter +10MB)
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: APK não gerado."
            exit 1
          fi
          
          # Zipalign e Assinatura V2/V3 (Obrigatórios no Android 16)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Bruno_Amy_Final.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-v17
          path: Sonic_Bruno_Amy_Final.apk
          
