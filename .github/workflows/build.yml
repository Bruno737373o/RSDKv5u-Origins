name: Build RSDKv5 Origins Stable (Base Nova)

on:
  workflow_dispatch:

jobs:
  v5-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RSDKv5 (Origins)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK Dependencies
        working-directory: ./dependencies/android
        run: |
          # Baixa as bibliotecas de áudio necessárias para o RSDKv5
          curl -L -O https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip
          curl -L -O https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip
          unzip -o \*.zip
          rm *.zip
          # Organiza as pastas para o compilador JNI encontrar
          mkdir -p libogg
          rsync -ar libogg-1.3.5/* libogg/
          mv libtheora-1.1.1 libtheora

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android 16 Manifest & Storage Patch
        run: |
          # Aplica correções críticas de manifesto para evitar o crash ao abrir
          $manifest = "android/app/src/main/AndroidManifest.xml"
          
          # Criando um manifesto limpo e compatível com Android 16
          cat <<EOF > $manifest
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="org.retrosdk.rsdkv5">
              
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

              <application
                  android:label="Sonic Origins"
                  android:requestLegacyExternalStorage="true"
                  android:extractNativeLibs="true"
                  tools:replace="android:allowBackup"
                  android:allowBackup="true">
                  <activity
                      android:name="org.libsdl.app.SDLActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          # Permissão para o Gradle
          chmod +x gradlew
          # Compila a versão estável (Revision 3) para 64 bits (exigência do Android 16)
          ./gradlew assembleDebug --no-daemon -PABIFILTERS="arm64-v8a" -PRETRO_REVISION=3

      - name: Sign APK (Proteção contra Pacote Inválido)
        run: |
          # Localiza o APK
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          # Alinhamento
          zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          # Gera chave de assinatura
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          # Assina com V2 e V3 para o Android 16 aceitar
          apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_v5U.apk Sonic_Aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-v5U
          path: Sonic_Origins_v5U.apk
