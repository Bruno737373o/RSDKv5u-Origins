name: Build Origins + Extra Slot Amy (Android 16 Fix)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod Amy
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Mod Code
        run: |
          find mod_amy -name "*.c" -exec cp -v {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp -v {} engine/Game/Objects/ \;

      - name: Build APK
        run: |
          cd engine/android
          chmod +x gradlew
          # Compila para as arquiteturas modernas
          ./gradlew assembleRelease -Pandroid.injected.build.abi="arm64-v8a"

      - name: Prepare and Sign APK
        run: |
          # 1. Localiza o APK original
          RAW_APK=$(find engine/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # 2. Zipalign (Obrigatório para Android 13+)
          # O alinhamento de 4 bytes é necessário para o sistema aceitar o APK
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 $RAW_APK SonicOrigins_Aligned.apk
          
          # 3. Gera chave de assinatura
          keytool -genkey -v -keystore dev-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev-alias -storepass password -keypass password -dname "CN=Android, OU=Dev, O=Game, L=World, ST=World, C=US"
          
          # 4. Assina com APKSigner (Garante esquema V2 e V3 para Android 16)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks dev-key.jks --ks-key-alias dev-alias --ks-pass pass:password --key-pass pass:password --out SonicOrigins_Final.apk SonicOrigins_Aligned.apk
          
          echo "Processo concluído!"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Android16-Compatible
          path: SonicOrigins_Final.apk
          
