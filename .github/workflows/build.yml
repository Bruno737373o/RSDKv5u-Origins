name: Build RSDKv5u Android

on: workflow_dispatch

jobs:
  # 1. Compilação do Núcleo para RetroArch (.so)
  build-retroarch-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Core (Arm64)
        run: |
          mkdir build_core && cd build_core
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DRETRO_CORE=ON \
          -DRSDK_REVISION=3
          make -j$(nproc)

      - name: Upload Core
        uses: actions/upload-artifact@v4
        with:
          name: rsdk_v5u_libretro_android
          path: build_core/*.so

  # 2. Compilação do Aplicativo Android (.apk)
  build-android-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Release)
        run: |
          # O repositório geralmente possui uma pasta 'android' com o projeto Gradle
          chmod +x ./android/gradlew
          cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rsdk_v5u_android_apk
          path: android/app/build/outputs/apk/release/*.apk
