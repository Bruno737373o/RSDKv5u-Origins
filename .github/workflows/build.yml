name: Build RSDKv5 Android (Original Manifest)

on:
  workflow_dispatch:

jobs:
  v5-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK Dependencies
        working-directory: ./dependencies/android
        run: |
          curl -L -O https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip
          curl -L -O https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip
          unzip -o \*.zip
          rm *.zip
          mkdir -p libogg
          rsync -ar libogg-1.3.5/* libogg/
          mv libtheora-1.1.1 libtheora

      - name: Patch Original Manifest (Android 16 Compatibility)
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # 1. Garante que todas as activities tenham o exported="true"
          # Primeiro removemos se já existir para evitar duplicados, depois adicionamos
          sed -i 's/android:exported="true"//g' $MANIFEST_PATH
          sed -i 's/android:exported="false"//g' $MANIFEST_PATH
          sed -i 's/<activity/<activity android:exported="true"/g' $MANIFEST_PATH
          
          # 2. Adiciona suporte a armazenamento legado se não estiver presente
          if ! grep -q "android:requestLegacyExternalStorage" "$MANIFEST_PATH"; then
            sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/g' $MANIFEST_PATH
          fi

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          # Compila usando o teu manifesto original editado
          ./gradlew assembleDebug --no-daemon -PABIFILTERS="arm64-v8a" -PRETRO_REVISION=3

      - name: Sign and Align APK
        run: |
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          BUILD_TOOLS_PATH=$(ls -d ${ANDROID_HOME}/build-tools/* | tail -1)
          
          # Alinhamento
          ${BUILD_TOOLS_PATH}/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          # Assinatura
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          ${BUILD_TOOLS_PATH}/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Original_Manifest.apk Sonic_Aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Original-Manifest
          path: Sonic_Origins_Original_Manifest.apk
