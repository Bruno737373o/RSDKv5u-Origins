name: Build Origins + Extra Slot Amy

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine (Origins)
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod (Amy Extra Slot)
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Apply Mod to Engine
        run: |
          # Copia os arquivos do mod para dentro da engine, sobrescrevendo os originais
          cp -R mod_amy/Game/Objects/* engine/Game/Objects/
          # Se houver arquivos de som/gráficos no mod que precisem estar no APK:
          # cp -R mod_amy/path/to/assets/* engine/android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd engine/android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.build.abi="armeabi-v7a,arm64-v8a"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Origins-Amy-ExtraSlot
          path: engine/android/app/build/outputs/apk/**/*.apk
