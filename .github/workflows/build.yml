name: Build Bruno Origins + Amy (SDL Fix 17.3)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Amy Mod Code
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: temp_amy

      - name: Download and Setup SDL2
        run: |
          # 1. Baixa o SDL2
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          
          # 2. Extrai na pasta JNI
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          
          # 3. Renomeia a pasta (Método Infalível)
          $parentPath = "android/app/jni"
          $oldName = "SDL2-2.28.3"
          $newName = "SDL"
          
          if (Test-Path "$parentPath/$newName") { Remove-Item -Recurse -Force "$parentPath/$newName" }
          
          # Entra na pasta para renomear sem erro de caminho
          Push-Location $parentPath
          Rename-Item -Path $oldName -NewName $newName
          Pop-Location

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Inject Amy and Fix Manifest
        run: |
          # 1. Injeta o código da Amy
          $objPath = "java/Game/Objects"
          if (!(Test-Path $objPath)) { New-Item -ItemType Directory -Force -Path $objPath }
          Copy-Item -Path "temp_amy/*.c" -Destination $objPath -ErrorAction SilentlyContinue
          Copy-Item -Path "temp_amy/*.h" -Destination $objPath -ErrorAction SilentlyContinue

          # 2. Fix Android 16 Exported Activity (Essencial para instalar no seu celular)
          $manifests = Get-ChildItem -Path android -Filter AndroidManifest.xml -Recurse
          foreach ($file in $manifests) {
              (Get-Content $file.FullName) -replace '<activity', '<activity android:exported="true"' | Set-Content $file.FullName
          }

      - name: Build RSDKv5 Android
        working-directory: ./android
        run: |
          # Clean para garantir que o APK não venha corrompido
          ./gradlew.bat clean
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="arm64-v8a"

      - name: Sign and Align APK
        shell: bash
        run: |
          # Procura o APK gerado
          RAW_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ERRO: O compilador falhou antes de gerar o APK. Verifique erros de C++ acima."
            exit 1
          fi
          
          # Zipalign e Assinatura V2/V3 para o seu Android 16
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" Sonic_Aligned.apk
          
          keytool -genkey -v -keystore dev.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev -storepass password -keypass password -dname "CN=Android, O=Dev, C=US"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks dev.jks --ks-key-alias dev --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out Sonic_Origins_Amy_Final.apk Sonic_Aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Amy-Final
          path: Sonic_Origins_Amy_Final.apk
