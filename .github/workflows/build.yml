name: Build Origins + Extra Slot Amy

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine (Origins)
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod (Amy Extra Slot)
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Apply Mod to Engine
        run: |
          # Procura onde estão os arquivos de objetos no mod e copia para a engine
          # O comando find garante que pegamos os arquivos .c e .h mesmo se a estrutura mudar
          find mod_amy -name "*.c" -exec cp {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp {} engine/Game/Objects/ \;
          
          # Caso o mod tenha uma estrutura específica de subpastas em Objects, 
          # tentamos uma cópia recursiva forçada se a pasta existir:
          if [ -d "mod_amy/Game/Objects" ]; then
            cp -rf mod_amy/Game/Objects/* engine/Game/Objects/
          else
            echo "Pasta Game/Objects não encontrada no mod, usando busca por extensões."
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd engine/android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.build.abi="armeabi-v7a,arm64-v8a"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Origins-Amy-ExtraSlot
          path: engine/android/app/build/outputs/apk/**/*.apk
