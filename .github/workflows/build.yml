name: Build Origins + Extra Slot Amy (Final Attempt)

on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: thesupersonic16/RSDKv5u-Origins
          submodules: recursive
          path: engine

      - name: Checkout Mod Amy
        uses: actions/checkout@v4
        with:
          repository: KiaraGale/Sonic-Mania-Decomp-Extra-Slot-Amy
          path: mod_amy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply Mod and Fix Version
        run: |
          # Remove conflitos e prepara pastas
          rm -rf engine/Game
          mkdir -p engine/Game/Objects
          
          # Copia apenas os arquivos essenciais do mod
          find mod_amy -name "*.c" -exec cp -v {} engine/Game/Objects/ \;
          find mod_amy -name "*.h" -exec cp -v {} engine/Game/Objects/ \;

          # Ajusta o Gradle para o Android 16 (API 35)
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' engine/android/app/build.gradle || true
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' engine/android/app/build.gradle || true

      - name: Build APK with Logs
        run: |
          cd engine/android
          chmod +x gradlew
          # O --info ajudará a ver o erro real se falhar de novo
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a" --info

      - name: Prepare and Sign APK
        if: success() # Só roda se o build passar
        run: |
          RAW_APK=$(find engine -name "*.apk" | grep -v "unaligned" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 "$RAW_APK" SonicOrigins_Aligned.apk
          
          keytool -genkey -v -keystore dev-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dev-alias -storepass password -keypass password -dname "CN=Android, OU=Dev, O=Game, L=World, ST=World, C=US"
          
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks dev-key.jks --ks-key-alias dev-alias --ks-pass pass:password --key-pass pass:password --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out SonicOrigins_Final.apk SonicOrigins_Aligned.apk

      - name: Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Android16-Final
          path: SonicOrigins_Final.apk
